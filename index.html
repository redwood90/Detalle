<!DOCTYPE=html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ojala te guste</title>
    <link rel="icon" href="corazon.png">
    <style> 
        body{
            align-items: center;
            background-color: rgb(188, 212, 163);
            background-image:url("villa.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font: 1em times new roman;
        }
        .carta{
            display: block;
           width:175px;
           height:175px;
           margin: auto;
           transition: 0.5s;
           opacity: 1;
           z-index: 2;
        }
        .carta:hover{
            transform: scale(1.1);
        }
        .papel{
            background-image: url(arena.jpg);
            background-size: cover;
            display: block;;
            width: 0px;
            height: 0px;
            background-color: white;
            margin-left: auto;
            margin-right: auto;
            overflow: hidden;
            transform: translateY(-100px);
            opacity: 0;
            z-index: 0;
                transition: 0.5s;
        }
        .mostrar{
            transform: translateY(50px);
            width: 1000px;
            height: 1000px;
            opacity: 1;
        }
        .ocultar{
            opacity: 0;
        }
        .area_ruleta{
            display: block;
            width: 350px;
            height: 350px;
            margin: 20px auto ;
            margin-top: 80px; 
        }
        .rueda{
           width: 100%;
           height: 100%;
           border-radius: 50%;
           position: relative;
           overflow: hidden;
           border: 5px solid #333;
           transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .slice {
           position: absolute;
           width: 50%;
           height: 50%;
           background: var(--clr);
           transform-origin: bottom right;
           transform: rotate(calc(60deg * var(--i))) skewY(30deg);
           background-image: var(--img);
           background-size: cover; 
           background-position: center;
        }
        .pointer {
    position: absolute;
    top: 130px; 
    left: 50%;
    transform: translateX(-50%);
    width: 0; 
    height: 0; 
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-top: 30px solid #e74c3c; 
    z-index: 100;
        }
        .corazon {
            position: absolute;
            top: 70%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            z-index: 50;
        }
        #spinBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    background: white;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    cursor: pointer;
    z-index: 1000;
    user-select: none;
    border: 3px solid #333;
    transition: 0.5s;
}
#spinBtn:hover {
    background: #e74c3c;
    color: white;
    
}
#spinBtn:active {
    transform: translate(-50%, -50%) scale(0.95);
    background: white;
}
.modelo {
    position: fixed; 
    top: -100%;      
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 400px;
    background-color: wheat;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
    z-index: 3000;   
    transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    opacity: 0;
}


.modelo.mostrar {
    top: 20%;        
    opacity: 1;
}


.btn-cerrar {
    margin-top: 15px;
    background: #e74c3c;
    color: white;
    border: none;
    padding: 5px 15px;
    border-radius: 5px;
    cursor: pointer;
}
h1{
    text-align: center;
    font-family: 'Brush Script MT', cursive;
    font-size: 2em;
}
h3{
    font-family: 'Brush Script MT', cursive;
    font-size: 1.5em;
    text-decoration: underline wavy black;
}
    </style>
</head>
<body>
    <img class="carta" src="carta.png" onclick="puntada()" > 
    <div id="x" class="papel">
        <h1>Prueba ese boton</h1>
        <div class="area_ruleta" >
            <div class="pointer"></div>
            <div id="spinBtn" onclick="girar()">GIRAR</div>
            <div class="rueda">
                <div class="slice" style="--i: 0; --img: url('luna1.png');"></div> 
                <div class="slice" style="--i: 1; --img: url('noche.png');"></div>
                <div class="slice" style="--i: 2; --img: url('casset.png');"></div>
                <div class="slice" style="--i: 3; --img: url('lluvia.png');"></div>
                <div class="slice" style="--i: 4; --img: url('guitarra.png');"></div>
                <div class="slice" style="--i: 5; --img: url('cielo.png');"></div>
            
            </div>
        </div>
        <img class="corazon" src="corazon.png">
    </div>
    <div id="tarjetaMaestra" class="modelo">
    <div id="cuerpoTarjeta">
        </div>
    <button onclick="cerrarTarjeta()" class="btn-cerrar">X</button>
</div>
<audio id="reproductor"></audio>  
<audio id="reproductor"></audio>
  <script>
    
function puntada(){
    const elemento = document.getElementById("x");
    if(elemento) elemento.classList.toggle("mostrar");
}

let gradosAcumulados = 0;

function girar() {
    const rueda = document.querySelector('.rueda');
    const boton = document.getElementById('spinBtn');
    const reproductor = document.getElementById('reproductor');
    const tarjeta = document.getElementById('tarjetaMaestra'); 
    const visorContenido = document.getElementById('cuerpoTarjeta'); 

    if (!rueda || !boton) return;

    
    if (tarjeta) tarjeta.classList.remove('mostrar');
    
    
    if (reproductor) {
        reproductor.pause();
        reproductor.currentTime = 0;
    }

    
    const giroExtra = Math.floor(Math.random() * 360);
    gradosAcumulados += 1800 + giroExtra;

    rueda.style.transition = "transform 4s cubic-bezier(0.2, 0, 0.2, 1)";
    rueda.style.transform = `rotate(${gradosAcumulados}deg)`;
    
    
    boton.style.pointerEvents = 'none'; 
    boton.style.opacity = '0.6';        
    boton.style.transform = 'translate(-50%, -50%) scale(0.9)'; 

    
    setTimeout(() => {
        
        boton.style.pointerEvents = 'auto';
        boton.style.opacity = '1';
        boton.style.transform = 'translate(-50%, -50%) scale(1)';

        const anguloReal = (360 - (gradosAcumulados % 360)) % 360;
        
        let HTML_Contenido = "";
        let cancion = "";

        
        if (anguloReal >= 0 && anguloReal < 60) {
            HTML_Contenido = "<h3>Miss You</h3><p>Una cancion que juraba no escuchar mientras estaba en este estado de no estar contigo, me recordaba mucho a ti, y yo amo esta canción, es gracioso, como tu solo recuerdo hace que evite algo que amo, da a pensar que yo te extraño mas de lo que amo muchas cosas.</p><p>tarde mucho haciendo esto, no es una queja digo, pero tarde mucho haciendo esto, no sabia muy bien que canciones poner hasta que se me ocurrio esta, se que es un poco absurdo, decirte que te extraño a estas alturas y mas con esta. su letra es, simple, poca mas bien, pero me encanta la parte de estar juntos por un momento, no se, me hace recordar lo simple de una relacion contigo, no me refiero a que sea malo, me encantaba ser tu novio, y escribir esto sumandole que es dificil se vuelve todavia mas con este nudo en la garganta, no se como la escuches, pero me gustaria que pensaras en mi incluso si no estoy junto a ti. <br> Cuando inicie esto no sabia muy bien que hacer, a mitad de la noche buscando la musica se me ocurrio que para que este detalle sea especial, sea algo que puedas ver muchas veces, este es el primer mensaje de 6 pero el orden poco importa, escucha como me siento por ti, lee lo que pienso cuando estas en mi mente, siente lo que muchas veces olvido decirte</p>";
            cancion = "miss you.mp3";
        } else if (anguloReal >= 60 && anguloReal < 120) {
            HTML_Contenido = "<h3>Videoclub</h3><p>Si... yo te pedi esta cancion, quiza sientas que no habra mucho significado detras de esta, en parte tienes razon, esta habla de amar incluso en la necesidad, haay, pensar eso me recuerda que no eh sido un buen novio,me pongo la soga al cuello diciendote esto pero, me miro y veo a alguien egoista y furico que no sabe amar de verdad, tal vez asi sea, pero en mi estado de inconciencia animal siempre esta este deseo de verte, y ser lo que buscas en un momento oscuro, un deseo algo pretencioso, pero dejame soñar, si ya es como un sueño estar junto a ti.<br>Esta relacion no es facil verdad? ignorando la distancia muchas veces tu y yo no hemos estado deacuera, me encantaria que eso cambiara y fuera perfecto, pero seamos honestos, tu eres tu y yo soy yo, y yo te amo, y mientras me quede vida y vos para decirte eso no dejare de prevalecer por los dos, no se si es mutuo, pero yo no me rendire contigo.<br>Volviendo a la cancion y retomando, quiza no me creas, pero te amare incluso cuando tu ya no me recuerdes mas.</p>";
            cancion = "videoclub.mp3";
        } else if (anguloReal >= 120 && anguloReal < 180) {
            HTML_Contenido = "<h3>My Name</h3><p>Esta cancion es impactante, no lo crees? recorde que te gusta the weekend y esta cancion me hizo pensar en ese mes que no estuvimos juntos.Trate de convencerme que no debia estar contigo mientras en el fondo solo me desgarraba la idea de no hablarte mas, los primeros dias fueron duros, los siguientes no fueron mucho mejores, incluso ahora que busco mantener el control, me desespera la idea de estar contigo denuevo, a ti no te pasa como a mi, pero que egoista de mi parte ignorar lo que sientes, comprendo cuando dices que tienes miedo, yo tambien lo tengo, pero prefiero hablar de eso contigo en chat<br>Call out my name, grita mi nombre. Deseaba que volvieras por tu cuenta, enserio queria que me dijieras que querias estar conmigo, fue tonto de mi parte haber dicho eso, no?, al final fue mi boca lo que causo todo,perosera por mi palabra de que haremos las cosas mejor que pienso volver a ti, mejor, diferente, lejos o cerca, todos mis caminos llevan a ti, y sin ti no me pienso ir a vivir una vida feliz</p>";
            cancion = "my name.mp3";
        } else if (anguloReal >= 180 && anguloReal < 240) {
            HTML_Contenido = "<h3>My Kind</h3><p>Encontre esta cancion mientras en tik tok (si se, re original yo), no me gusta mucho pero senti que a ti si y que daria a interpretar lo que te quiero decir aqui.My kind of woman, mi tipo de mujer o mi chica ideal, no gastare este espacio diciendote *hay es que eres la chica percefta y tu mereces todo*, tu ya sabes que me traes todo loco por ti y me tiene haciendote esto a las 3 DE LA MAÑANA. Lo que te dire aqui, es que no hay mujer para mi que no seas tu, no cambiaria nada de ti, incluso tus defectos los veo hermosos eh incluso cuando peleas, me enamoras un poco mas cada vez, sera que me embrujaste,;l, yo sospecho. </p><p>No se en que orden leas esto, y no soy psicologo ni poeta para decirte como cambiara tu pensamiento con forme leas, y a este punto parece que las canciones no tienen mucho que ver con lo que te digo, si tienen que ver, deecho las escucho mientras escribo, es que tengo una forma particular de ver esto, quiza no lo entiendas, pero quiero que sientas lo que te voy a decir o ya te dije. </p>";
            cancion = "my kind.mp3";
        } else if (anguloReal >= 240 && anguloReal < 300) {
            HTML_Contenido = "<h3>Tek It</h3><p>Tek it, amo esta canción, es de las primeras que me dedicaste y ademas me relaja, no se hasta que punto las 2 cosas estan relcionadas pero, el punto es que tu obra permanece conmigo, tus detalles, tus palabras, mejor dicho, tu estas en mi (eso sonaria terrible en otro contexto XD), lejos de considerarte una parte esencial de mi vida  digamos que tu estas en mi razonamiento, pienso en ti, en que harias, en si me piensas.</p><p>Me pediste que sacrificara algo alhacer esto, inluido el hecho de que estuve haceindo esto a las 3 DE LA MAÑANA, supoongo que lo mas grande que te puedo dar, y sacrifico por ti, es mi vulnerabilidad al decirte que sin ti no puedo, y si suena a obsecion, (ni se le ocurra dejarme por eso) pero debo admitir que de tanto tiempo contigo y amandote como no pude amar a alguien antes ya no es facil desligarse de ti, no creo poder darte algo mas que mi yo mismo y el hecho de que te amo, pero si crees que puedo dar algo mas, siempre estare dispuesto a buscarlo</p>";
            cancion = "tek it.mp3";
        } else {
            HTML_Contenido = "<h3>All Mine</h3><p>All mine, Ultima cancion para mi, pero podria ser la primera para ti, lo cual es curioso porque fue la primera que me enviaste y senti que me dedicaste, es especial para mi, siempre que la escucho quiero estar en silencio y solo pensando, es algo que me gusta, puedo pensar con claridad y mantenerme sobre la tierra, hace un tiempo no lo hago, esta vida esta llena de situaciones y aun asi yo no me detengo a analizarlo. La razon por la que hago esto mas que porque tu me lo pediste es porque queria ver que tan lejos llegaria por ti, y aunque la que decide eres tu, considero que lo hice bien, y que aun podria darte mas, no necesito la motivacion adecuada, disfrute hacer esto, asi que gracias, asi no volvamos me hiciste sentir que valio la pena </p><p>Debe ser un texto largo para ocupar la cancion entera, pfff, naah, solo quiero decirte que usted es maravillosa, que me encanta como es cuando esta conmigo y que cuando estemos juntos juntos le voy a besar hasta el apellido pa que sepa que usted a mi me trae siendo totalmente suyo, como la canción (esa parte me salio por pura casualidad lo juro),y me gustaria que esto fuera reciproco, aun asi, si no lo fuera, ame estar con usted, y no me arrepiento haberla conocido, o amado. </p>";
            cancion = "all mine.mp3";
        }

        
        if (visorContenido && tarjeta) {
            visorContenido.innerHTML = HTML_Contenido;
            tarjeta.classList.add('mostrar'); 
        }

        
        if (reproductor && cancion !== "") {
            reproductor.src = cancion;
            reproductor.play().catch(e => console.log("Esperando interacción para audio"));
        }

    }, 4000);
}


function cerrarTarjeta() {
    const tarjeta = document.getElementById('tarjetaMaestra');
    if (tarjeta) tarjeta.classList.remove('mostrar');
}
</script>
</body>    
</html>
